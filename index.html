<!DOCTYPE html>
<html lang="pt-BR">

<!--

<!--
Objetivo:

Aplicação de catálogo de produtos em uma estrutura de arquivos tripartida (HTML, CSS e JS)
- Deve permitir que o usuário gerencie uma lista de itens em tempo real; 

A interface deve conter:
- um formulário para entrada de novos dados (nome, categoria e preço)
- uma área de exibição que gere automaticamente 'cards' ou linhas de tabela para cada item cadastrado
- uma seção de inteligência de dados que apresente métricas calculadas automaticamente — como o valor total do inventário ou o preço médio dos produtos — atualizando-se instantaneamente a cada nova inserção ou remoção de item .
-->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tech Store</title>
</head>

<body>
    <main>
        <h1>Brenda’s Tech Store</h1>
       
        <!-- Formulário para adicionar produtos -->
        <h2>Novo Produto</h2>
        <div class="form-section">
            <form id="productForm">
                <!-- Nome do produto -->
                <label for="fname">Nome do item:</label>
                <input type="text" id="fname" name="fname" placeholder="Digite o nome..." required>
                <br>

                <!-- Seleção de categoria -->
                <label for="fcategory">Categoria:</label>
                <select id="fcategory" name="fcategory">
                    <option value="computadores">Computadores e periféricos</option>
                    <option value="smartphones">Smartphones e tablets</option>
                    <option value="audio">Áudio e vídeo</option>
                    <option value="games">Games e consoles</option>
                    <option value="gadgets">Gadgets e acessórios</option>
                    <option value="outra">Outra...</option>
                </select>
                <br>


                <!-- Nova categoria (exibida ao selecionar "Outra") -->
                <div id="newCategoryGroup" style="display: none;">
                    <label for="newCategory">Nome da nova categoria:</label>
                    <input type="text" id="newCategory" name="newCategory" placeholder="Digite nova categoria">
                </div>

                <!-- Preço do item -->
                <label for="fprice">Preço (R$):</label>
                <input type="number" id="fprice" name="fprice" placeholder="0.00" step="0.01" required>
                <br>

                <!-- Envio do formulário com os dados do novo item -->
                <button type="submit">Cadastrar</button>
            </form>
        </div>

        <!-- Seção de métricas -->
        <h2>Métricas</h2>
        <div class="stats-section">        
            <p><b class="rotuloMetrica">Total:</b> R$ <span id="total">0.00</span></p>
            <p><b class="rotuloMetrica">Média:</b> R$ <span id="average">0.00</span></p>
        </div>

        <!-- Área de exibição dos produtos -->
        <div class="catalog-section">
            <h2>Catálogo</h2>
            <!-- Lista de produtos cadastrados -->
            <div id="catalog" class="catalog-container">
                <!-- Os produtos serão inseridos aqui -->
            </div>
        </div>


    </main>
    <script src="script.js"></script>
</body>

</html>
